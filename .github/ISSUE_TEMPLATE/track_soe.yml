name: 赛道反馈 · 国企央企
description: 国企/央企/事业单位向使用反馈
title: "[国企] "
labels: ["track:国企", "feedback"]
body:
  - type: dropdown
    id: stage
    attributes:
      label: 你卡在哪一步
      options: [模板/赛道, setup-zh, apply-zh 简历格式, 打招呼/求职信, 匹配打分, tracker, 其他]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: 发生了什么 / 期望什么（格式差异、政治面貌字段等）
    validations:
      required: true
